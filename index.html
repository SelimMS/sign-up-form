<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Document</title>
  </head>
  <body>
    <div class="website">
      <div class="background">
        <div class="logo">
          <img src="images/odin-lined.png" width="15%">
          <p>ODIN</p>
        </div>
        <p id="footer">Photo by <a>Halie West</a> on <a>Unsplash</a></p>
      </div>
      <div class="sign-up">
        <p id="text">This is not a real online service! You know you need something 
          <br>like this in your life to help you realize your deepest dreams. 
          <br>Sign up <i>now</i> to get started.
          <br><br>You know <i>you</i> want to.</p>
        <div class="form">
          <form>
            <p>Let's do this!</p>
            <div style="float:left;margin-right:60px;padding:10px;">
              <label for="first_name">First Name</label>
              <input type="text" id="first_name" name="first_name">
            </div>
            <div style="float:left;padding:10px;">
              <label for="last_name">Last Name</label>
              <input type="text" id="last_name" name="last_name">
            </div>
            <div style="float:left;margin-right:60px;padding:10px;">
              <label for="user_email">Email</label>
              <input type="email" id="user_email" name="email">
            </div>
            <div style="float:left;padding:10px;">
              <label for="phone">Phone Number</label>
              <input type="tel" id="phone" name="phone">
            </div>
            <div style="float:left;margin-right:60px;padding:10px;">
              <label for="pwd">Password</label>
              <input type="password" id="pwd" name="pwd" required>
            </div>
            <div style="float:left;padding:10px;">
              <label for="conf-pwd">Confirm Password</label>
              <input type="password" id="conf-pwd" name="conf-pwd" required>
            </div>
          </form>
        </div>
        <div class="footer">
          <button>Create Account</button>
          <p>Already have an account? <a>Log in</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
