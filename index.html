<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
  </head>
  <body>
    <div class="website">
      <div class="background">
        <div class="logo">
          <img src="images/odin-lined.png" width="15%">
          <p>ODIN</p>
          <p id="footer">Photo by <a>Halie West</a> on <a>Unsplash</a></p>
        </div>
      </div>
      <div class="sign-up">
        <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up now to get started</p>
        <p>You know you want to.</p>
        <div class="form">
          <form>
            <p>Let's do this!</p>
            <label for="first_name">First Name</label>
            <input type="text" id="first_name">
            <label for="last_name">Last Name</label>
            <input type="text" id="last_name">
            <label for="user_email">Email Address</label>
            <input type="email" id="user_email" name="email">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone">
            <label for="pwd">Password</label>
            <input type="password" id="pwd">
            <label for="conf-pwd">Confirm Password</label>
            <input type="password" id="conf-pwd">
          </form>
          <button>Create Account</button>
          <p>Already have an account?<a>Log in</a></p>
        </div>
      </div>
    </div>
  </body>
</html>
